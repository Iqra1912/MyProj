<!DOCTYPE html>
<html>
<head>
<title>CoreDash Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/gridstack@9.2.0/dist/gridstack.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/gridstack@9.2.0/dist/gridstack-all.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
background:#f4f6fb;
}
.sidebar{
width:220px;
height:100vh;
background:#111827;
color:white;
}
.sidebar a{
color:#cbd5e1;
display:block;
padding:10px 0;
text-decoration:none;
}
.sidebar a:hover{
color:white;
}
.grid-stack-item-content{
background:white;
border-radius:12px;
padding:10px;
}
</style>

</head>

<body>

<div class="d-flex">

<!-- Sidebar -->
<div class="sidebar p-3">

<h4>CoreDash</h4>

<a href="#">Dashboard</a>
<a href="#" onclick="toggleAnalytics()">Analytics</a>
<a href="#" onclick="window.print()">Export</a>

</div>

<!-- Main -->
<div class="flex-grow-1 p-4">

<h2>Dashboard</h2>

<!-- Upload -->

<form id="uploadForm" class="mb-4">

<input type="file" name="file" class="form-control mb-2">

<button class="btn btn-primary">Upload Dataset</button>

</form>

<h3 id="revenue">$0</h3>

<!-- Charts -->

<div class="grid-stack"></div>

<!-- Insights -->

<div class="card mt-4">

<div class="card-header">
AI Insights
</div>

<div class="card-body">

<div id="insightsList"></div>

</div>

</div>

</div>
</div>

<script>

let grid
let datasetId = null

document.addEventListener("DOMContentLoaded",()=>{

grid = GridStack.init({
float:true,
cellHeight:120,
margin:10
})

document.getElementById("uploadForm")
.addEventListener("submit",uploadFile)

})

async function uploadFile(e){

e.preventDefault()

const formData = new FormData(e.target)

const res = await fetch("/api/upload",{
method:"POST",
body:formData
})

const data = await res.json()

if(data.error){
alert(data.error)
return
}

renderCharts(data.charts, data.data)
renderInsights(data.insights)

}

async function loadDashboard(){

const res = await fetch(`/api/dashboard/kpis?dataset_id=${datasetId}`,{
credentials:"include"
})

const data = await res.json()

renderDashboard(data)

}

function renderDashboard(data){

document.getElementById("revenue").innerText="$"+data.revenue

renderCharts(data.charts)

renderInsights(data.insights)

}

function renderCharts(chartConfigs, dataset){

grid.removeAll()

chartConfigs.forEach((chart,index)=>{

const el = document.createElement("div")

el.classList.add("grid-stack-item")

el.innerHTML=`

<div class="grid-stack-item-content card shadow-sm">
<div class="card-header">${chart.type} chart</div>
<div class="card-body">
<canvas id="chart_${index}"></canvas>
</div>
</div>

`

grid.addWidget(el,{w:6,h:3})

setTimeout(()=>{

const labels = dataset.map(row => row[chart.x])

let values = []

if(chart.y){
values = dataset.map(row => row[chart.y])
}else{
values = labels
}

new Chart(document.getElementById(`chart_${index}`),{

type:chart.type,

data:{
labels: chart.labels || labels,
datasets:[{
label: chart.title || chart.y || chart.x,
data: chart.values || values,

backgroundColor:[
"#0d6efd",
"#198754",
"#ffc107",
"#dc3545",
"#6f42c1"
]
}]
},

options:{
responsive:true
}

})

},100)

})

}

function renderInsights(insights){

const container=document.getElementById("insightsList")

container.innerHTML=""

insights.forEach(text=>{

const div=document.createElement("div")

div.className="p-2 mb-2 bg-light rounded"

div.innerText=text

container.appendChild(div)

})

}

</script>

</body>
</html>
